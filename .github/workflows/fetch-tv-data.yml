name: Fetch TV Stream Data
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch and Parse IPTV Data
        run: |
          mkdir -p data/index data/countries data/categories
          curl -sL "https://iptv-org.github.io/iptv/index.m3u" -o data/master.m3u
          echo "Downloaded $(wc -c < data/master.m3u) bytes"
          
          python3 scripts/parse_iptv.py
      
      - name: Install Wrangler
        run: npm install -g wrangler@latest
      
      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          for f in data/index/*.json data/stats.json; do
            npx wrangler r2 object put --remote "megan-tv-streams/${f#data/}" --file="$f"
          done
          for f in data/countries/*.json; do
            npx wrangler r2 object put --remote "megan-tv-streams/${f#data/}" --file="$f"
          done
          for f in data/categories/*.json; do
            npx wrangler r2 object put --remote "megan-tv-streams/${f#data/}" --file="$f"
          done
          for f in data/cartoons/*.json; do
            npx wrangler r2 object put --remote "megan-tv-streams/${f#data/}" --file="$f"
          done
          for f in data/pbskids/*.json; do
            npx wrangler r2 object put --remote "megan-tv-streams/${f#data/}" --file="$f"
          done
          echo "✅ R2 upload complete!"

      - name: Update KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler kv key put --binding TV_CACHE stats --path=data/stats.json
          echo "✅ KV updated!"
